name: Update Schedule
on:
  repository_dispatch:
    types: [update-schedule]

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      - name: Install jq
        run: sudo apt-get install -y jq
      - name: Update schedule.json
        env:
          ADMIN_PASSWORD: ${{ secrets.ADMIN_PASSWORD }}
        run: |
          # Extract payload from webhook
          ACTION=$(echo $GITHUB_EVENT_PATH | jq -r '.client_payload.action')
          PASSWORD=$(echo $GITHUB_EVENT_PATH | jq -r '.client_payload.password')
          DATE=$(echo $GITHUB_EVENT_PATH | jq -r '.client_payload.date // empty')
          TIME=$(echo $GITHUB_EVENT_PATH | jq -r '.client_payload.time // empty')
          DESCRIPTION=$(echo $GITHUB_EVENT_PATH | jq -r '.client_payload.description // empty')
          INDEX=$(echo $GITHUB_EVENT_PATH | jq -r '.client_payload.index // empty')

          if [ "$PASSWORD" != "$ADMIN_PASSWORD" ]; then
            echo "Invalid password"
            exit 1
          fi

          if [ "$ACTION" = "add" ]; then
            if [ -z "$DATE" ] || [ -z "$TIME" ] || [ -z "$DESCRIPTION" ]; then
              echo "Missing required fields"
              exit 1
            fi
            jq ".schedule += [{\"date\": \"$DATE\", \"time\": \"$TIME\", \"description\": \"$DESCRIPTION\"}]" schedule.json > temp.json
            mv temp.json schedule.json
          elif [ "$ACTION" = "edit" ]; then
            if [ -z "$INDEX" ] || [ -z "$DATE" ] || [ -z "$TIME" ] || [ -z "$DESCRIPTION" ]; then
              echo "Missing required fields or index"
              exit 1
            fi
            jq ".schedule[$INDEX] = {\"date\": \"$DATE\", \"time\": \"$TIME\", \"description\": \"$DESCRIPTION\"}" schedule.json > temp.json
            mv temp.json schedule.json
          elif [ "$ACTION" = "delete" ]; then
            if [ -z "$INDEX" ]; then
              echo "Missing index"
              exit 1
            fi
            jq "del(.schedule[$INDEX])" schedule.json > temp.json
            mv temp.json schedule.json
          else
            echo "Invalid action"
            exit 1
          fi

      - name: Commit changes
        run: |
          git config --global user.name 'GitHub Action'
          git config --global user.email 'action@github.com'
          git add schedule.json
          git commit -m "Update schedule.json"
          git push
