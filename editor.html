<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gong und Yoga - Termine bearbeiten</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 0;
            padding: 20px;
            background-color: #f4f4f4;
            color: #333;
        }
        h1, h2 {
            text-align: center;
        }
        .container {
            max-width: 800px;
            margin: 0 auto;
            background-color: white;
            padding: 20px;
            border-radius: 8px;
        }
        .form-group {
            margin-bottom: 15px;
        }
        label {
            display: block;
            margin-bottom: 5px;
        }
        input, button {
            padding: 8px;
            width: 100%;
            box-sizing: border-box;
        }
        button {
            background-color: #4CAF50;
            color: white;
            border: none;
            cursor: pointer;
        }
        button:hover {
            background-color: #45a049;
        }
        #schedule-list {
            list-style: none;
            padding: 0;
        }
        #schedule-list li {
            background-color: #f9f9f9;
            padding: 10px;
            margin: 5px 0;
            border-radius: 4px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .error, .success {
            text-align: center;
        }
        .error { color: red; }
        .success { color: green; }
    </style>
</head>
<body>
    <div class="container">
        <h1>Gong und Yoga - Termine bearbeiten</h1>
        <h2>Neuen Termin hinzufügen</h2>
        <form id="schedule-form" action="https://api.web3forms.com/submit" method="POST">
            <input type="hidden" name="access_key" value="82985997-3cf0-4b36-86a8-e208e79396a9">
            <input type="hidden" name="webhook" value="https://api.github.com/repos/marvineck/WebsiteGuY/dispatches">
            <input type="hidden" name="event_type" value="update-schedule">
            <input type="hidden" name="action" value="add">
            <div class="form-group">
                <label for="date">Datum (YYYY-MM-DD):</label>
                <input type="text" id="date" name="date" placeholder="z.B. 2025-06-01" required>
            </div>
            <div class="form-group">
                <label for="time">Uhrzeit (HH:MM):</label>
                <input type="text" id="time" name="time" placeholder="z.B. 18:00" required>
            </div>
            <div class="form-group">
                <label for="description">Beschreibung:</label>
                <input type="text" id="description" name="description" placeholder="z.B. Gong Yoga für Anfänger" required>
            </div>
            <div class="form-group">
                <label for="password">Passwort:</label>
                <input type="password" id="password" name="password" required>
            </div>
            <button type="submit">Termin hinzufügen</button>
        </form>
        <h2>Aktuelle Termine</h2>
        <ul id="schedule-list"></ul>
        <p id="message" class="error"></p>
    </div>

    <script>
        // Fetch and display current schedule
        function loadSchedule() {
            fetch('schedule.json')
                .then(response => response.json())
                .then(data => {
                    const scheduleList = document.getElementById('schedule-list');
                    scheduleList.innerHTML = '';
                    data.schedule.forEach((event, index) => {
                        const li = document.createElement('li');
                        li.innerHTML = `${event.date} - ${event.time}: ${event.description}
                            <div>
                                <button onclick="editEvent(${index})">Bearbeiten</button>
                                <button onclick="deleteEvent(${index})">Löschen</button>
                            </div>`;
                        scheduleList.appendChild(li);
                    });
                })
                .catch(error => {
                    document.getElementById('message').textContent = 'Fehler beim Laden der Termine.';
                    document.getElementById('message').className = 'error';
                    console.error('Error:', error);
                });
        }

        // Handle form submission
        document.getElementById('schedule-form').addEventListener('submit', async (e) => {
            e.preventDefault();
            const form = e.target;
            const message = document.getElementById('message');
            try {
                const response = await fetch(form.action, {
                    method: 'POST',
                    body: new FormData(form)
                });
                const result = await response.json();
                if (response.ok) {
                    form.reset();
                    loadSchedule();
                    message.textContent = 'Termin erfolgreich hinzugefügt! (Änderungen können kurz dauern)';
                    message.className = 'success';
                } else {
                    message.textContent = result.message || 'Fehler beim Hinzufügen.';
                    message.className = 'error';
                }
            } catch (error) {
                message.textContent = 'Serverfehler. Bitte später versuchen.';
                message.className = 'error';
            }
        });

        // Edit event
        async function editEvent(index) {
            const password = prompt('Passwort eingeben:');
            const date = prompt('Neues Datum (YYYY-MM-DD):');
            const time = prompt('Neue Uhrzeit (HH:MM):');
            const description = prompt('Neue Beschreibung:');
            if (date && time && description && password) {
                const formData = new FormData();
                formData.append('access_key', '82985997-3cf0-4b36-86a8-e208e79396a9');
                formData.append('webhook', 'https://api.github.com/repos/marvineck/WebsiteGuY/dispatches');
                formData.append('event_type', 'update-schedule');
                formData.append('action', 'edit');
                formData.append('index', index);
                formData.append('date', date);
                formData.append('time', time);
                formData.append('description', description);
                formData.append('password', password);

                try {
                    const response = await fetch('https://api.web3forms.com/submit', {
                        method: 'POST',
                        body: formData
                    });
                    const result = await response.json();
                    const message = document.getElementById('message');
                    if (response.ok) {
                        loadSchedule();
                        message.textContent = 'Termin erfolgreich bearbeitet! (Änderungen können kurz dauern)';
                        message.className = 'success';
                    } else {
                        message.textContent = result.message || 'Fehler beim Bearbeiten.';
                        message.className = 'error';
                    }
                } catch (error) {
                    document.getElementById('message').textContent = 'Serverfehler. Bitte später versuchen.';
                    document.getElementById('message').className = 'error';
                }
            }
        }

        // Delete event
        async function deleteEvent(index) {
            const password = prompt('Passwort eingeben:');
            if (password) {
                const formData = new FormData();
                formData.append('access_key', '82985997-3cf0-4b36-86a8-e208e79396a9');
                formData.append('webhook', 'https://api.github.com/marvineck/WebsiteGuY/dispatches');
                formData.append('event_type', 'update-schedule');
                formData.append('action', 'delete');
                formData.append('index', index);
                formData.append('password', password);

                try {
                    const response = await fetch('https://api.web3forms.com/submit', {
                        method: 'POST',
                        body: formData
                    });
                    const result = await response.json();
                    const message = document.getElementById('message');
                    if (response.ok) {
                        loadSchedule();
                        message.textContent = 'Termin erfolgreich gelöscht! (Änderungen können kurz dauern)';
                        message.className = 'success';
                    } else {
                        message.textContent = result.message || 'Fehler beim Löschen.';
                        message.className = 'error';
                    }
                } catch (error) {
                    document.getElementById('message').textContent = 'Serverfehler. Bitte später versuchen.';
                    document.getElementById('message').className = 'error';
                }
            }
        }

        // Load schedule on page load
        loadSchedule();
    </script>
</body>
</html>
