<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gong und Yoga - Termine bearbeiten</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 0;
            padding: 20px;
            background-color: #f4f4f4;
            color: #333;
        }
        h1, h2 {
            text-align: center;
        }
        .container {
            max-width: 800px;
            margin: 0 auto;
            background-color: white;
            padding: 20px;
            border-radius: 8px;
        }
        .form-group {
            margin-bottom: 15px;
        }
        label {
            display: block;
            margin-bottom: 5px;
        }
        input, button {
            padding: 8px;
            width: 100%;
            box-sizing: border-box;
        }
        button {
            background-color: #4CAF50;
            color: white;
            border: none;
            cursor: pointer;
        }
        button:hover {
            background-color: #45a049;
        }
        #schedule-list {
            list-style: none;
            padding: 0;
        }
        #schedule-list li {
            background-color: #f9f9f9;
            padding: 10px;
            margin: 5px 0;
            border-radius: 4px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .error {
            color: red;
            text-align: center;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>Gong und Yoga - Termine bearbeiten</h1>
        <h2>Neuen Termin hinzufügen</h2>
        <form id="schedule-form">
            <div class="form-group">
                <label for="date">Datum (YYYY-MM-DD):</label>
                <input type="text" id="date" name="date" placeholder="z.B. 2025-06-01" required>
            </div>
            <div class="form-group">
                <label for="time">Uhrzeit (HH:MM):</label>
                <input type="text" id="time" name="time" placeholder="z.B. 18:00" required>
            </div>
            <div class="form-group">
                <label for="description">Beschreibung:</label>
                <input type="text" id="description" name="description" placeholder="z.B. Gong Yoga für Anfänger" required>
            </div>
            <div class="form-group">
                <label for="password">Passwort:</label>
                <input type="password" id="password" name="password" required>
            </div>
            <button type="submit">Termin hinzufügen</button>
        </form>
        <h2>Aktuelle Termine</h2>
        <ul id="schedule-list"></ul>
        <p id="error-message" class="error"></p>
    </div>

    <script>
        // Fetch and display current schedule
        function loadSchedule() {
            fetch('schedule.json')
                .then(response => response.json())
                .then(data => {
                    const scheduleList = document.getElementById('schedule-list');
                    scheduleList.innerHTML = '';
                    data.schedule.forEach((event, index) => {
                        const li = document.createElement('li');
                        li.innerHTML = `${event.date} - ${event.time}: ${event.description}
                            <div>
                                <button onclick="editEvent(${index})">Bearbeiten</button>
                                <button onclick="deleteEvent(${index})">Löschen</button>
                            </div>`;
                        scheduleList.appendChild(li);
                    });
                })
                .catch(error => {
                    document.getElementById('error-message').textContent = 'Fehler beim Laden der Termine.';
                    console.error('Error:', error);
                });
        }

        // Add new event
        document.getElementById('schedule-form').addEventListener('submit', async (e) => {
            e.preventDefault();
            const date = document.getElementById('date').value;
            const time = document.getElementById('time').value;
            const description = document.getElementById('description').value;
            const password = document.getElementById('password').value;

            try {
                const response = await fetch('YOUR_API_ENDPOINT', { // Replace with your endpoint, e.g., AWS Lambda or Web3Forms
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ date, time, description, password, action: 'add' })
                });
                const result = await response.json();
                if (response.ok) {
                    document.getElementById('schedule-form').reset();
                    loadSchedule();
                    document.getElementById('error-message').textContent = 'Termin erfolgreich hinzugefügt!';
                } else {
                    document.getElementById('error-message').textContent = result.message || 'Fehler beim Hinzufügen.';
                }
            } catch (error) {
                document.getElementById('error-message').textContent = 'Serverfehler. Bitte später versuchen.';
            }
        });

        // Edit event
        async function editEvent(index) {
            const password = prompt('Passwort eingeben:');
            const date = prompt('Neues Datum (YYYY-MM-DD):');
            const time = prompt('Neue Uhrzeit (HH:MM):');
            const description = prompt('Neue Beschreibung:');
            if (date && time && description && password) {
                try {
                    const response = await fetch('YOUR_API_ENDPOINT', {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({ index, date, time, description, password, action: 'edit' })
                    });
                    const result = await response.json();
                    if (response.ok) {
                        loadSchedule();
                        document.getElementById('error-message').textContent = 'Termin erfolgreich bearbeitet!';
                    } else {
                        document.getElementById('error-message').textContent = result.message || 'Fehler beim Bearbeiten.';
                    }
                } catch (error) {
                    document.getElementById('error-message').textContent = 'Serverfehler. Bitte später versuchen.';
                }
            }
        }

        // Delete event
        async function deleteEvent(index) {
            const password = prompt('Passwort eingeben:');
            if (password) {
                try {
                    const response = await fetch('YOUR_API_ENDPOINT', {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({ index, password, action: 'delete' })
                    });
                    const result = await response.json();
                    if (response.ok) {
                        loadSchedule();
                        document.getElementById('error-message').textContent = 'Termin erfolgreich gelöscht!';
                    } else {
                        document.getElementById('error-message').textContent = result.message || 'Fehler beim Löschen.';
                    }
                } catch (error) {
                    document.getElementById('error-message').textContent = 'Serverfehler. Bitte später versuchen.';
                }
            }
        }

        // Load schedule on page load
        loadSchedule();
    </script>
</body>
</html>
