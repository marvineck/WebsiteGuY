<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gong und Yoga - Termine bearbeiten</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 0;
            padding: 20px;
            background-color: #f4f4f4;
            color: #333;
        }
        h1, h2 {
            text-align: center;
        }
        .container {
            max-width: 800px;
            margin: 0 auto;
            background-color: white;
            padding: 20px;
            border-radius: 8px;
        }
        .form-group {
            margin-bottom: 15px;
        }
        label {
            display: block;
            margin-bottom: 5px;
        }
        input, button {
            padding: 8px;
            width: 100%;
            box-sizing: border-box;
        }
        button {
            background-color: #4CAF50;
            color: white;
            border: none;
            cursor: pointer;
        }
        button:hover {
            background-color: #45a049;
        }
        #schedule-list {
            list-style: none;
            padding: 0;
        }
        #schedule-list li {
            background-color: #f9f9f9;
            padding: 10px;
            margin: 5px 0;
            border-radius: 4px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .error, .success {
            text-align: center;
        }
        .error { color: red; }
        .success { color: green; }
        #download-button {
            margin-top: 20px;
            padding: 10px;
            background-color: #2196F3;
            text-align: center;
        }
        #download-button:hover {
            background-color: #1976D2;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>Gong und Yoga - Termine bearbeiten</h1>
        <h2>Neuen Termin hinzufügen</h2>
        <form id="schedule-form">
            <div class="form-group">
                <label for="date">Datum (YYYY-MM-DD):</label>
                <input type="text" id="date" name="date" placeholder="z.B. 2025-06-01" pattern="\d{4}-\d{2}-\d{2}" required>
            </div>
            <div class="form-group">
                <label for="time">Uhrzeit (HH:MM):</label>
                <input type="text" id="time" name="time" placeholder="z.B. 18:00" pattern="\d{2}:\d{2}" required>
            </div>
            <div class="form-group">
                <label for="description">Beschreibung:</label>
                <input type="text" id="description" name="description" placeholder="z.B. Gong Yoga für Anfänger" required>
            </div>
            <div class="form-group">
                <label for="password">Passwort:</label>
                <input type="password" id="password" name="password" required>
            </div>
            <button type="submit">Termin hinzufügen</button>
        </form>
        <h2>Aktuelle Termine</h2>
        <ul id="schedule-list"></ul>
        <button id="download-button">Aktualisiertes schedule.json herunterladen</button>
        <p id="message" class="error"></p>
        <p><strong>Anleitung:</strong> Nach dem Bearbeiten der Termine klicken Sie auf "Aktualisiertes schedule.json herunterladen". Laden Sie die Datei anschließend auf GitHub hoch, um die Änderungen auf der Website anzuzeigen.</p>
    </div>

    <script>
        const ADMIN_PASSWORD = 'y0g4G0ng2025'; // Replace with a secure password
        let scheduleData = { schedule: [] };

        // Fetch and display current schedule
        function loadSchedule() {
            fetch('schedule.json')
                .then(response => response.json())
                .then(data => {
                    scheduleData = data;
                    const scheduleList = document.getElementById('schedule-list');
                    scheduleList.innerHTML = '';
                    data.schedule.forEach((event, index) => {
                        const li = document.createElement('li');
                        li.innerHTML = `${event.date} - ${event.time}: ${event.description}
                            <div>
                                <button onclick="editEvent(${index})">Bearbeiten</button>
                                <button onclick="deleteEvent(${index})">Löschen</button>
                            </div>`;
                        scheduleList.appendChild(li);
                    });
                })
                .catch(error => {
                    document.getElementById('message').textContent = 'Fehler beim Laden der Termine.';
                    document.getElementById('message').className = 'error';
                    console.error('Error:', error);
                });
        }

        // Handle form submission (add event)
        document.getElementById('schedule-form').addEventListener('submit', (e) => {
            e.preventDefault();
            const message = document.getElementById('message');
            const password = document.getElementById('password').value;
            if (password !== ADMIN_PASSWORD) {
                message.textContent = 'Ungültiges Passwort.';
                message.className = 'error';
                return;
            }

            const date = document.getElementById('date').value;
            const time = document.getElementById('time').value;
            const description = document.getElementById('description').value;

            scheduleData.schedule.push({ date, time, description });
            document.getElementById('schedule-form').reset();
            loadSchedule();
            message.textContent = 'Termin hinzugefügt! Bitte schedule.json herunterladen und hochladen.';
            message.className = 'success';
        });

        // Edit event
        function editEvent(index) {
            const password = prompt('Passwort eingeben:');
            if (password !== ADMIN_PASSWORD) {
                document.getElementById('message').textContent = 'Ungültiges Passwort.';
                document.getElementById('message').className = 'error';
                return;
            }

            const date = prompt('Neues Datum (YYYY-MM-DD):', scheduleData.schedule[index].date);
            const time = prompt('Neue Uhrzeit (HH:MM):', scheduleData.schedule[index].time);
            const description = prompt('Neue Beschreibung:', scheduleData.schedule[index].description);

            if (date && time && description) {
                scheduleData.schedule[index] = { date, time, description };
                loadSchedule();
                document.getElementById('message').textContent = 'Termin bearbeitet! Bitte schedule.json herunterladen und hochladen.';
                document.getElementById('message').className = 'success';
            }
        }

        // Delete event
        function deleteEvent(index) {
            const password = prompt('Passwort eingeben:');
            if (password !== ADMIN_PASSWORD) {
                document.getElementById('message').textContent = 'Ungültiges Passwort.';
                document.getElementById('message').className = 'error';
                return;
            }

            scheduleData.schedule.splice(index, 1);
            loadSchedule();
            document.getElementById('message').textContent = 'Termin gelöscht! Bitte schedule.json herunterladen und hochladen.';
            document.getElementById('message').className = 'success';
        }

        // Download updated schedule.json
        document.getElementById('download-button').addEventListener('click', () => {
            const dataStr = "data:text/json;charset=utf-8," + encodeURIComponent(JSON.stringify(scheduleData, null, 2));
            const downloadAnchor = document.createElement('a');
            downloadAnchor.setAttribute('href', dataStr);
            downloadAnchor.setAttribute('download', 'schedule.json');
            document.body.appendChild(downloadAnchor);
            downloadAnchor.click();
            document.body.removeChild(downloadAnchor);
        });

        // Load schedule on page load
        loadSchedule();
    </script>
</body>
</html>
